[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
script  = "script"
solc    = "0.8.20"

# Optimizer — on for production deployment
optimizer        = true
optimizer_runs   = 200

# Mainnet fork for local testing
# Uncomment and set before running fork tests:
# [rpc_endpoints]
# mainnet = "${MAINNET_RPC}"

[fmt]
line_length    = 100
tab_width      = 4
bracket_spacing = true
